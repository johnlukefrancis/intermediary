<!-- Path: app/splashscreen.html -->
<!-- Description: Static splashscreen page shown before main window is ready -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Intermediary</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #050508;
      }

      body {
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "SF Pro Text", "Helvetica Neue", sans-serif;
        color: #e8e8ec;
      }

      .splash {
        display: grid;
        gap: 14px;
        justify-items: center;
      }

      .mark {
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 12px;
        color: #9898a8;
      }

      .title {
        letter-spacing: 0.04em;
        font-size: 24px;
      }

      .loader {
        width: 160px;
        height: 2px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .loader::after {
        content: "";
        display: block;
        width: 48px;
        height: 100%;
        background: rgba(196, 104, 138, 0.9);
        animation: scan 1.1s ease-in-out infinite;
      }

      @keyframes scan {
        0% {
          transform: translateX(-56px);
        }
        50% {
          transform: translateX(112px);
        }
        100% {
          transform: translateX(216px);
        }
      }
    </style>
  </head>
  <body>
    <main class="splash" aria-live="polite" aria-busy="true">
      <div class="mark">Loading</div>
      <div class="title">Intermediary</div>
      <div class="loader" role="presentation"></div>
    </main>
  </body>
</html>
