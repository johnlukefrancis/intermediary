<!-- Path: app/splashscreen.html -->
<!-- Description: Deck-themed boot screen shown before main window is ready -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Intermediary</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #050508;
      }

      body {
        display: grid;
        place-items: center;
        font-family: "SF Mono", "Fira Code", Consolas, monospace;
        color: #e8e8ec;
        position: relative;
        /* Dot grid substrate (16px intervals, accent at ~2.5% opacity) */
        background-image: radial-gradient(
          circle,
          rgba(196, 104, 138, 0.025) 1px,
          transparent 1px
        );
        background-size: 16px 16px;
      }

      /* Vignette overlay */
      body::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          ellipse 100% 100% at 50% 50%,
          transparent 40%,
          rgba(0, 0, 0, 0.4) 100%
        );
        opacity: 0.35;
      }

      .splash {
        display: grid;
        gap: 14px;
        justify-items: center;
        z-index: 1;
      }

      .mark {
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 10px;
        color: #606070;
      }

      .title {
        letter-spacing: 0.05em;
        font-size: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
      }

      .loader {
        width: 160px;
        height: 2px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        overflow: hidden;
      }

      .loader::after {
        content: "";
        display: block;
        width: 48px;
        height: 100%;
        background: rgba(196, 104, 138, 0.9);
        box-shadow: 0 0 8px 0 rgba(196, 104, 138, 0.4);
        border-radius: 2px;
        animation: scan 1.1s ease-in-out infinite;
      }

      @keyframes scan {
        0% {
          transform: translateX(-56px);
        }
        50% {
          transform: translateX(112px);
        }
        100% {
          transform: translateX(216px);
        }
      }

      /* Handset-ish widths: keep splash proportions tighter */
      @media (max-width: 520px) {
        .splash {
          gap: 10px;
        }

        .mark {
          font-size: 9px;
        }

        .title {
          font-size: 20px;
          letter-spacing: 0.04em;
        }

        .loader {
          width: 128px;
        }
      }

      /* Reduced motion: static bar, no scan */
      @media (prefers-reduced-motion: reduce) {
        .loader::after {
          animation: none;
          width: 80px;
          opacity: 0.5;
        }
      }
    </style>
  </head>
  <body>
    <main class="splash" aria-live="polite" aria-busy="true">
      <div class="mark">:: loading</div>
      <div class="title">Intermediary</div>
      <div class="loader" role="presentation"></div>
    </main>
  </body>
</html>
